vversion: "3.8"

services:
  drupal:
    image: drupal:10-apache
    container_name: drupal_app
    ports:
      - "8080:80"
    volumes:
      - ./drupal:/var/www/html
    depends_on:
      - db
      - solr

  db:
    image: mysql:8
    container_name: drupal_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: drupal
      MYSQL_USER: drupal
      MYSQL_PASSWORD: drupal
    ports:
      - "3306:3306"

  solr:
    image: solr:8
    container_name: solr_server
    ports:
      - "8983:8983"
    command:
      - solr-precreate
      - drupal_core
